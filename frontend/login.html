<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        h1 { color: #333; }
        form { display: flex; flex-direction: column; gap: 10px; }
        label { font-weight: bold; }
        input { padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; background-color: #2c7be5; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background-color: #1a68c9; }
        button:disabled { background-color: #a0c4e8; cursor: not-allowed; }
        .message { padding: 10px; margin-top: 15px; border-radius: 4px; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        nav { margin-bottom: 20px; padding: 10px; background-color: #f5f5f5; border-radius: 4px; }
        nav a { margin-right: 15px; color: #2c7be5; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <nav>
        <a href="login.html">Вход</a>
        <a href="create_user.html">Регистрация</a>
        <a href="tasks.html">Задачи</a>
    </nav>

    <h1>Вход в систему</h1>

    <form id="loginForm">
        <label for="username">Логин:</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Пароль:</label>
        <input type="password" id="password" name="password" required>

        <button type="submit" id="submitBtn">Войти</button>
    </form>

    <div id="message" class="message"></div>

    <script>
        const form = document.getElementById('loginForm');
        const messageBox = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        const API_BASE = '/TaskManager/TaskManager.dll/api';

        function showMessage(text, isError) {
            messageBox.textContent = text;
            messageBox.className = 'message ' + (isError ? 'error' : 'success');
            messageBox.style.display = 'block';
        }

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            messageBox.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Вход...';

                const response = await fetch(API_BASE + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });

                const responseText = await response.text();
                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (err) {
                    result = { message: responseText };
                }

                if (!response.ok || !result.token) {
                    showMessage('Ошибка входа: ' + (result.message || result.error || 'Неверный логин или пароль'), true);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Войти';
                    return;
                }

                // Успешный вход: сохраняем токен и перенаправляем
                localStorage.setItem('jwt', result.token);
                showMessage('Успешный вход! Перенаправление...', false);

                // Небольшая задержка для красоты UX, затем редирект
                setTimeout(() => {
                    window.location.href = 'tasks.html';
                }, 500);

            } catch (err) {
                showMessage('Сетевая ошибка: ' + err.message, true);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Войти';
            }
        });
    </script>
</body>
</html>
