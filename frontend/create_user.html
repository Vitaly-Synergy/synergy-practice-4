<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создание пользователя</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        h1 { color: #333; }
        form { display: flex; flex-direction: column; gap: 10px; }
        label { font-weight: bold; }
        input { padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; background-color: #2c7be5; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background-color: #1a68c9; }
        button:disabled { background-color: #a0c4e8; cursor: not-allowed; }
        .message { padding: 10px; margin-top: 15px; border-radius: 4px; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        nav { margin-bottom: 20px; padding: 10px; background-color: #f5f5f5; border-radius: 4px; }
        nav a { margin-right: 15px; color: #2c7be5; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <nav>
        <a href="login.html">Вход</a>
        <a href="create_user.html">Регистрация</a>
        <a href="tasks.html">Задачи</a>
    </nav>

    <h1>Создание пользователя</h1>

    <form id="userForm">
        <label for="username">Логин (Username):</label>
        <input type="text" id="username" name="username" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="fullName">Полное имя:</label>
        <input type="text" id="fullName" name="fullName" required>

        <label for="password">Пароль:</label>
        <input type="password" id="password" name="password" required minlength="4">

        <label for="passwordConfirm">Повторите пароль:</label>
        <input type="password" id="passwordConfirm" name="passwordConfirm" required minlength="4">

        <button type="submit" id="submitBtn">Создать пользователя</button>
    </form>

    <div id="message" class="message"></div>

    <script>
        const form = document.getElementById('userForm');
        const messageBox = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        const API_BASE = '/TaskManager/TaskManager.dll/api';

        function showMessage(text, isError) {
            messageBox.textContent = text;
            messageBox.className = 'message ' + (isError ? 'error' : 'success');
            messageBox.style.display = 'block';
        }

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            messageBox.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const fullName = document.getElementById('fullName').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;

            if (password !== passwordConfirm) {
                showMessage('Пароли не совпадают. Пожалуйста, проверьте введенные данные.', true);
                return;
            }

            const userData = {
                username: username,
                email: email,
                fullName: fullName,
                password: password
            };

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Создание...';

                const createResp = await fetch(API_BASE + '/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const createText = await createResp.text();
                let createResult;
                try {
                    createResult = JSON.parse(createText);
                } catch (err) {
                    createResult = { message: createText };
                }

                if (!createResp.ok) {
                    showMessage('Ошибка создания: ' + (createResult.message || createResult.error || createText), true);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Создать пользователя';
                    return;
                }

                showMessage('Пользователь создан. Выполняется автоматический вход...', false);

                const loginResp = await fetch(API_BASE + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });

                const loginText = await loginResp.text();
                let loginResult;
                try {
                    loginResult = JSON.parse(loginText);
                } catch (err) {
                    loginResult = { message: loginText };
                }

                if (!loginResp.ok || !loginResult.token) {
                    showMessage('Пользователь создан, но не удалось войти: ' + (loginResult.message || loginResult.error || loginText), true);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Создать пользователя';
                    return;
                }

                localStorage.setItem('jwt', loginResult.token);

                window.location.href = 'tasks.html';

            } catch (err) {
                showMessage('Сетевая ошибка: ' + err.message, true);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Создать пользователя';
            }
        });
    </script>
</body>
</html>
