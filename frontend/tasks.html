<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список задач</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f5f5f5; font-weight: bold; }
        tr:hover { background-color: #f9f9f9; }
        .btn { display: inline-block; padding: 8px 12px; background-color: #2c7be5; color: white; text-decoration: none; border-radius: 4px; font-size: 14px; }
        .btn:hover { background-color: #1a68c9; }
        .btn-logout { background-color: #dc3545; float: right; }
        .btn-logout:hover { background-color: #c82333; }
        .message { padding: 10px; margin-top: 15px; border-radius: 4px; display: none; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        nav { margin-bottom: 20px; padding: 10px; background-color: #f5f5f5; border-radius: 4px; overflow: hidden; }
        nav a { margin-right: 15px; color: #2c7be5; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        .loading { text-align: center; padding: 20px; color: #666; font-style: italic; }
    </style>
</head>
<body>
    <nav>
        <a href="create_user.html">Регистрация</a>
        <a href="tasks.html" style="font-weight: bold;">Список задач</a>
        <a href="create_task.html">+ Новая задача</a>
        <a href="#" class="btn btn-logout" id="logoutBtn">Выйти</a>
    </nav>

    <h1>Список задач</h1>

    <div id="loading" class="loading">Загрузка задач...</div>
    <div id="message" class="message error"></div>

    <table id="tasksTable" style="display: none;">
        <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Статус</th>
                <th>Приоритет</th>
                <th>Назначено</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody id="tasksBody">
            <!-- Сюда будут вставляться задачи через JS -->
        </tbody>
    </table>

    <script>
        const API_BASE = '/TaskManager/TaskManager.dll/api';
        const loadingDiv = document.getElementById('loading');
        const tasksTable = document.getElementById('tasksTable');
        const tasksBody = document.getElementById('tasksBody');
        const messageBox = document.getElementById('message');
        const logoutBtn = document.getElementById('logoutBtn');

        // Проверка авторизации при загрузке
        const token = localStorage.getItem('jwt');
        if (!token) {
            window.location.href = 'login.html';
        }

        // Обработчик кнопки выхода
        logoutBtn.addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('jwt');
            window.location.href = 'login.html';
        });

        function showMessage(text) {
            messageBox.textContent = text;
            messageBox.style.display = 'block';
            loadingDiv.style.display = 'none';
        }

        // Загрузка списка задач
        async function loadTasks() {
            try {
                const response = await fetch(API_BASE + '/tasks', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });

                if (response.status === 401) {
                    localStorage.removeItem('jwt');
                    window.location.href = 'login.html';
                    return;
                }

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error('Ошибка сервера: ' + response.status + ' ' + errText);
                }

                const tasks = await response.json();
                renderTasks(tasks);

            } catch (err) {
                showMessage('Не удалось загрузить задачи: ' + err.message);
            }
        }

        // Отрисовка таблицы
        function renderTasks(tasks) {
            loadingDiv.style.display = 'none';

            if (!tasks || tasks.length === 0) {
                tasksBody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Задач пока нет. <a href="create_task.html">Создайте первую!</a></td></tr>';
                tasksTable.style.display = 'table';
                return;
            }

            tasksBody.innerHTML = ''; // Очистка

            tasks.forEach(task => {
                const tr = document.createElement('tr');

                const id = task.TaskID;
                const title = task.Title;
                const status = task.StatusName || 'Неизвестно';
                const priority = task.PriorityName || 'Неизвестно';
                const assignedTo = task.AssignedToName || '—';

                tr.innerHTML = `
                    <td>${id}</td>
                    <td>${title}</td>
                    <td>${status}</td>
                    <td>${priority}</td>
                    <td>${assignedTo}</td>
                    <td>
                        <a href="edit_task.html?id=${id}" class="btn">Редактировать</a>
                    </td>
                `;
                tasksBody.appendChild(tr);
            });

            tasksTable.style.display = 'table';
        }

        // Запуск загрузки при открытии страницы
        loadTasks();
    </script>
</body>
</html>
