<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой профиль</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        h1 { color: #333; }
        form { display: flex; flex-direction: column; gap: 10px; }
        label { font-weight: bold; }
        input { padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; background-color: #2c7be5; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background-color: #1a68c9; }
        button:disabled { background-color: #a0c4e8; cursor: not-allowed; }
        .message { padding: 10px; margin-top: 15px; border-radius: 4px; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        nav { margin-bottom: 20px; padding: 10px; background-color: #f5f5f5; border-radius: 4px; }
        nav a { margin-right: 15px; color: #2c7be5; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        .loading { text-align: center; padding: 20px; color: #666; font-style: italic; }
        .user-info { background: #f9f9f9; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        .user-info p { margin: 5px 0; }
        .user-info strong { display: inline-block; width: 120px; }
        hr { margin: 30px 0; border: none; border-top: 1px solid #ddd; }
    </style>
</head>
<body>
    <nav>
        <a href="tasks.html">Список задач</a>
        <a href="create_task.html">+ Новая задача</a>
        <a href="edit_user.html" style="font-weight: bold;">Мой профиль</a>
        <a href="#" id="logoutBtn" style="float: right; color: #dc3545;">Выйти</a>
    </nav>

    <h1>Мой профиль</h1>

    <div id="loading" class="loading">Загрузка данных...</div>
    <div id="message" class="message"></div>

    <!-- Информация о пользователе -->
    <div id="userInfo" class="user-info" style="display: none;">
        <p><strong>Логин:</strong> <span id="userUsername"></span></p>
        <p><strong>ID:</strong> <span id="userId"></span></p>
        <p><strong>Дата регистрации:</strong> <span id="userCreated"></span></p>
    </div>

    <!-- Форма редактирования -->
    <div id="editFormBlock" style="display: none;">
        <h2>Редактировать профиль</h2>
        <form id="editForm">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="fullName">Полное имя:</label>
            <input type="text" id="fullName" name="fullName" required>

            <hr>

            <label for="newPassword">Новый пароль (оставьте пустым, если не хотите менять):</label>
            <input type="password" id="newPassword" name="newPassword" minlength="4">

            <label for="confirmPassword">Повторите новый пароль:</label>
            <input type="password" id="confirmPassword" name="confirmPassword" minlength="4">

            <button type="submit" id="submitBtn">Сохранить изменения</button>
        </form>
    </div>

    <script>
        const API_BASE = '/TaskManager/TaskManager.dll/api';
        const token = localStorage.getItem('jwt');

        // Проверка авторизации
        if (!token) {
            window.location.href = 'login.html';
        }

        // Загрузка данных текущего пользователя
        async function loadCurrentUser() {
            try {
                const resp = await fetch(API_BASE + '/users/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (resp.status === 401) {
                    localStorage.removeItem('jwt');
                    window.location.href = 'login.html';
                    return;
                }

                if (!resp.ok) {
                    document.getElementById('loading').textContent = 'Ошибка загрузки данных.';
                    return;
                }

                const user = await resp.json();
                renderUser(user);
            } catch (err) {
                document.getElementById('loading').textContent = 'Ошибка: ' + err.message;
            }
        }

        function renderUser(user) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('editFormBlock').style.display = 'block';

            document.getElementById('userUsername').textContent = user.Username || user.username || '—';
            document.getElementById('userId').textContent = user.UserID || user.userId || '—';
            document.getElementById('userCreated').textContent = user.CreatedAt || user.createdAt || '—';

            document.getElementById('email').value = user.Email || user.email || '';
            document.getElementById('fullName').value = user.FullName || user.fullName || '';
        }

        function showMessage(text, isError) {
            const box = document.getElementById('message');
            box.textContent = text;
            box.className = 'message ' + (isError ? 'error' : 'success');
            box.style.display = 'block';
        }

        // Обновление профиля
        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Сохранение...';

            const email = document.getElementById('email').value.trim();
            const fullName = document.getElementById('fullName').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Проверка совпадения паролей
            if (newPassword || confirmPassword) {
                if (newPassword !== confirmPassword) {
                    showMessage('Пароли не совпадают.', true);
                    btn.disabled = false;
                    btn.textContent = 'Сохранить изменения';
                    return;
                }
                if (newPassword.length < 4) {
                    showMessage('Пароль должен быть не короче 4 символов.', true);
                    btn.disabled = false;
                    btn.textContent = 'Сохранить изменения';
                    return;
                }
            }

            const data = {
                email: email,
                fullName: fullName,
                newPassword: newPassword,
                confirmPassword: confirmPassword
            };

            try {
                const resp = await fetch(API_BASE + '/users/me', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(data)
                });

                const text = await resp.text();
                let result;
                try { result = JSON.parse(text); } catch(err) { result = { message: text }; }

                if (resp.status === 401) {
                    localStorage.removeItem('jwt');
                    window.location.href = 'login.html';
                    return;
                }

                if (!resp.ok) {
                    showMessage('Ошибка: ' + (result.error || result.message || text), true);
                } else {
                    showMessage('Профиль успешно обновлён!', false);
                    // Очищаем поля пароля
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                }
            } catch (err) {
                showMessage('Сетевая ошибка: ' + err.message, true);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Сохранить изменения';
            }
        });

        // Кнопка выхода
        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('jwt');
            window.location.href = 'login.html';
        });

        // Запуск загрузки
        loadCurrentUser();
    </script>
</body>
</html>
